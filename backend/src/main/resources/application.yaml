spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: mobile-web-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/mobile-web?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&sessionVariables=auto_increment_increment=1}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      connection-init-sql: SET @@SESSION.auto_increment_increment = 1
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      encoding: UTF-8
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:change-this-local-secret}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:123456}
    user-id: ${ADMIN_USER_ID:2}
  oss:
    sync-demo-assets: ${OSS_SYNC_DEMO_ASSETS:true}
    endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    public-base-url: ${OSS_PUBLIC_BASE_URL:https://mobile-web-design.oss-cn-beijing.aliyuncs.com}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  wx:
    app-id: ${WX_APP_ID:}
    app-secret: ${WX_APP_SECRET:}
  email:
    from: ${EMAIL_FROM:${spring.mail.username:}}
    subject: 羽球在线登录验证码
    code-length: ${EMAIL_CODE_LENGTH:6}
    valid-time-seconds: ${EMAIL_VALID_TIME_SECONDS:300}
    interval-seconds: ${EMAIL_INTERVAL_SECONDS:60}
    debug: ${EMAIL_DEBUG:false}
  upload:
    max-size-mb: ${UPLOAD_MAX_SIZE_MB:50}
  netease:
    news:
      category-id: ${NETEASE_NEWS_CATEGORY_ID:1}
      pages: ${NETEASE_NEWS_PAGES:10}
      list-url-pattern: ${NETEASE_NEWS_LIST_URL_PATTERN:https://sports.163.com/special/00051L24/ymq09%s.html}
      default-cover-url: ${NETEASE_NEWS_DEFAULT_COVER_URL:https://mobile-web-design.oss-cn-beijing.aliyuncs.com/uploads/312f8966-5d01-4db8-9618-fd653bcbd731.jpg}
      startup-sync: ${NETEASE_NEWS_STARTUP_SYNC:true}
      scheduled-sync: ${NETEASE_NEWS_SCHEDULED_SYNC:true}
      sync-interval-ms: ${NETEASE_NEWS_SYNC_INTERVAL_MS:300000}
