spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: mobile-web-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/mobile_web;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:change-this-local-secret}
  oss:
    sync-demo-assets: ${OSS_SYNC_DEMO_ASSETS:true}
    endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    public-base-url: ${OSS_PUBLIC_BASE_URL:https://mobile-web-design.oss-cn-beijing.aliyuncs.com}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  wx:
    app-id: ${WX_APP_ID:}
    app-secret: ${WX_APP_SECRET:}
  juhe:
    news:
      enabled: ${JUHE_NEWS_ENABLED:false}
      key: ${JUHE_NEWS_KEY:}
      url: ${JUHE_NEWS_URL:https://v.juhe.cn/toutiao/index}
      type: ${JUHE_NEWS_TYPE:tiyu}
      category-id: ${JUHE_NEWS_CATEGORY_ID:1}
      page-size: ${JUHE_NEWS_PAGE_SIZE:30}
      max-pages: ${JUHE_NEWS_MAX_PAGES:2}
      default-cover-url: ${JUHE_NEWS_DEFAULT_COVER_URL:https://mobile-web-design.oss-cn-beijing.aliyuncs.com/uploads/312f8966-5d01-4db8-9618-fd653bcbd731.jpg}
      keywords: ${JUHE_NEWS_KEYWORDS:羽毛球,国羽,羽联,世界羽联,BWF,苏迪曼杯,汤姆斯杯,尤伯杯,全英公开赛,中国公开赛,印尼公开赛,马来西亚公开赛,新加坡公开赛,日本公开赛,韩国公开赛,丹麦公开赛,法国公开赛,亚锦赛,世锦赛,奥运羽毛球,男单,女单,男双,女双,混双,石宇奇,陈雨菲,何冰娇,韩悦,李诗沣,梁伟铿,王昶,郑思维,黄雅琼,冯彦哲,黄东萍,陈清晨,贾一凡,刘圣书,谭宁,安赛龙,桃田贤斗,戴资颖,山口茜,安洗莹,李梓嘉,骆建佑,昆拉武特,因达农,辛杜}
